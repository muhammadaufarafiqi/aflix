# ?? XAMPP MySQL (password default XAMPP = kosong) ???????????
spring.datasource.url=jdbc:mysql://localhost:3306/aflix_db?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
