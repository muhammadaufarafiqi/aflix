# ?? JPA / Hibernate ?????????????????????????????????????????
# "update" = tidak drop tabel, hanya update struktur
spring.jpa.hibernate.ddl-auto=update
# Diubah ke true agar kamu bisa melihat proses pembuatan tabel di console
spring.jpa.show-sql=true
# Dialect diperbarui sesuai saran log (lebih kompatibel)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Menambah format agar SQL di console lebih rapi dibaca
spring.jpa.properties.hibernate.format_sql=true

